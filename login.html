<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal | Aldercrest University</title>

    <link rel="stylesheet" href="css/style.css">

    <style>
        .login-box{
            max-width:500px;
            margin:50px auto;
            text-align:center;
        }

        input{
            width:100%;
            padding:15px;
            margin-top:8px;
            margin-bottom:20px;
            font-size:16px;
            border:1px solid #cfc7b5;
            border-radius:4px;
            box-sizing:border-box;
            font-family:Georgia, serif;
        }

        label{
            display:block;
            text-align:left;
            font-weight:bold;
            margin-top:15px;
        }

        .small{
            color:#666;
            font-size:15px;
        }
    </style>

</head>

<body>

<div class="container">

<img src="images/crest.png" class="crest" alt="University Crest">

<h1>ALDERCREST UNIVERSITY</h1>

<h2>Student Portal</h2>

<p class="motto">
Office of Information Technology
</p>

<hr>

<div class="login-box">

<label>Student ID</label>

<input type="text" placeholder="AU-LAW-260001">

<label>Password</label>

<input type="password" placeholder="Password">

<a href="dashboard.html">
<button>ENTER PORTAL</button>
</a>

<p class="small">

Need assistance?<br>

Contact the Office of Information Technology.

</p>

</div>

</div>

</body>
</html>
