<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aldercrest University College of Law</title>
<link rel="stylesheet" href="css/style.css">
    <style>
        body{
            margin:0;
            background:#f7f4ed;
            color:#1b2a41;
            font-family:Georgia, serif;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            text-align:center;
            background:white;
            padding:60px;
            border-radius:12px;
            box-shadow:0 10px 30px rgba(0,0,0,.12);
            max-width:700px;
        }

        h1{
            font-size:52px;
            margin-bottom:5px;
            letter-spacing:2px;
        }

        h2{
            font-weight:normal;
            color:#7a6a3a;
            margin-top:0;
        }

        p{
            font-size:20px;
            line-height:1.6;
        }

        button{
            margin-top:30px;
            padding:16px 40px;
            background:#1b2a41;
            color:white;
            border:none;
            border-radius:6px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#314b70;
        }
    </style>

</head>

<body>

<div class="card">

<h1>ALDERCREST</h1>

<h2>College of Law</h2>

<p>
Welcome to your Student Portal.
</p>

<p>
Semester: <strong>1L • Fall</strong>
</p>

<a href="dashboard.html">
    <button>Enter Campus</button>
</a>

</div>

</body>
</html>
